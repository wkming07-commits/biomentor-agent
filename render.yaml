services:
  - type: web
    name: biomentor-agent-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: '["https://frontend-eta-nine-7rvsekcz80.vercel.app","http://localhost:3000","http://localhost:3010"]'
